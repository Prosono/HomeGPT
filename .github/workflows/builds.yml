name: Build & Push (GHCR)

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 👇 Make a lowercase owner for GHCR tags
      - name: Lowercase owner
        id: owner
        run: echo "lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Read add-on version
        id: version
        run: |
          version="$(sed -n 's/^version: "\(.*\)"/\1/p' config.yaml)"
          if [ -z "$version" ]; then
            echo "Failed to read version from config.yaml" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      # 👇 Cache Docker layers
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # 👇 Cache Python dependencies (if used inside Docker)
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 👇 Build & Push with cache
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          tags: |
            ghcr.io/${{ steps.owner.outputs.lower }}/homegpt:${{ steps.version.outputs.value }}
            ghcr.io/${{ steps.owner.outputs.lower }}/homegpt:latest
